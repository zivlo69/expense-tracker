<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&M 雲端記帳本</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #667eea; --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        /* MIN 模式的顏色變數 */
        .theme-min { --primary: #ff4d4f; --bg-grad: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-grad); min-height: 100vh; padding: 20px; transition: 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { background: var(--primary); color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-sync { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        
        .main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .chart-container { position: relative; height: 250px; width: 100%; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .amt { font-weight: bold; font-size: 18px; }
        .btn-del { color: #999; background: none; border: none; cursor: pointer; font-size: 12px; }
        
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body id="bodyTag">

<div class="container">
    <div class="header">
        <div>
            <h1 id="titleTxt">Z&M 雲端記帳本</h1>
            <div id="status" style="font-size: 12px; margin-top: 5px; opacity: 0.9;">初始化中...</div>
        </div>
        <button class="btn-sync" id="syncBtn">🔄 手動刷新</button>
    </div>

    <div class="main-grid">
        <div>
            <div class="card">
                <h2>📊 支出比例圖</h2>
                <div class="chart-container"><canvas id="expenseChart"></canvas></div>
                <div id="statsList" style="margin-top: 15px;"></div>
            </div>
            <div class="card">
                <h2>📝 最近記錄</h2>
                <div id="list"></div>
            </div>
        </div>

        <div class="card" style="height: fit-content; position: sticky; top: 20px;">
            <h2>🧾 記一筆</h2>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="date">
            </div>
            <div class="form-group">
                <label>記帳人 (會自動記住你的選擇)</label>
                <select id="person" onchange="app.handleUserChange(this.value)">
                    <option value="ZIV">ZIV</option>
                    <option value="MIN">MIN</option>
                </select>
            </div>
            <div class="form-group"><label>分類</label><select id="cat"></select></div>
            <div class="form-group"><label>金額</label><input type="number" id="amt" placeholder="0" inputmode="numeric"></div>
            <div class="form-group"><label>描述</label><input type="text" id="desc" placeholder="備註"></div>
            <button class="btn-main" id="addBtn">儲存記錄</button>
        </div>
    </div>
</div>

<script>
// --- 請在此處貼上你的 GAS 網址 ---
const MASTER_URL = "在此貼上你的網址"; 
// ------------------------------

const categories = ['早餐', '中餐', '晚餐', '消夜', '飲料', '油錢', '停車', 'ETC', '車輛保養維修', '車輛保險稅金', '交通車票計程車', '房貸', '水費', '電費', '瓦斯費', '大樓管理費', '治裝', '教育', '娛樂', '家用修繕', '住家雜費', '食材費用', '零食餅乾', '住宿費', '醫療', '保險費', '家用網路', '手機費', '稅TAX'];
const colorPalette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8bc34a', '#f44336', '#2196f3', '#ffeb3b', '#9c27b0', '#00bcd4', '#e91e63', '#673ab7', '#3f51b5', '#03a9f4', '#009688', '#4caf50', '#cddc39', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e', '#607d8b', '#333333', '#1a237e', '#b71c1c', '#1b5e20'];

class App {
    constructor() {
        this.expenses = JSON.parse(localStorage.getItem('zm_data') || '[]');
        this.currentUser = localStorage.getItem('zm_user') || 'ZIV';
        this.chart = null;
        this.init();
    }

    init() {
        // 設定初始使用者介面
        document.getElementById('person').value = this.currentUser;
        this.applyUserTheme(this.currentUser);

        // 初始化分類選單
        const catSelect = document.getElementById('cat');
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            catSelect.appendChild(opt);
        });
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        document.getElementById('addBtn').onclick = () => this.add();
        document.getElementById('syncBtn').onclick = () => this.fetchCloud();

        this.fetchCloud();
    }

    handleUserChange(val) {
        this.currentUser = val;
        localStorage.setItem('zm_user', val);
        this.applyUserTheme(val);
    }

    applyUserTheme(user) {
        const body = document.getElementById('bodyTag');
        const title = document.getElementById('titleTxt');
        if (user === 'MIN') {
            body.classList.add('theme-min');
            title.textContent = 'MIN 雲端記帳本';
        } else {
            body.classList.remove('theme-min');
            title.textContent = 'ZIV 雲端記帳本';
        }
    }

    async fetchCloud() {
        const status = document.getElementById('status');
        status.textContent = '☁️ 雲端同步中...';
        try {
            const res = await fetch(MASTER_URL);
            const data = await res.json();
            if (Array.isArray(data)) {
                this.expenses = data;
                localStorage.setItem('zm_data', JSON.stringify(this.expenses));
                status.textContent = '最後同步: ' + new Date().toLocaleTimeString();
            }
        } catch (e) {
            status.textContent = '❌ 目前為離線模式';
        }
        this.render();
    }

    async add() {
        const amtValue = document.getElementById('amt').value;
        if (!amtValue) return alert('請輸入金額');
        
        const item = {
            id: Date.now().toString(),
            date: document.getElementById('date').value,
            person: document.getElementById('person').value,
            category: document.getElementById('cat').value,
            amount: parseFloat(amtValue),
            description: document.getElementById('desc').value
        };
        
        this.expenses.push(item);
        this.render();
        document.getElementById('amt').value = '';
        document.getElementById('desc').value = '';
        
        await this.sync();
    }

    async delete(id) {
        if (!confirm('確定刪除此筆記錄？')) return;
        this.expenses = this.expenses.filter(e => e.id !== id);
        this.render();
        await this.sync();
    }

    async sync() {
        const status = document.getElementById('status');
        status.textContent = '📡 正在推送到雲端...';
        try {
            await fetch(MASTER_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(this.expenses)
            });
            localStorage.setItem('zm_data', JSON.stringify(this.expenses));
            status.textContent = '✅ 已存入 2026 分頁';
        } catch (e) {
            alert('連線中斷，稍後自動重試');
        }
    }

    render() {
        const list = document.getElementById('list');
        const statsList = document.getElementById('statsList');
        
        list.innerHTML = this.expenses.slice().reverse().map(e => `
            <div class="record-item">
                <div>
                    <strong>${e.category}</strong> <small style="color:#666">${e.person}</small><br>
                    <span style="font-size:12px; color:#999;">${e.date} ${e.description}</span>
                </div>
                <div style="text-align:right">
                    <span class="amt">$${e.amount.toLocaleString()}</span><br>
                    <button class="btn-del" onclick="app.delete('${e.id}')">刪除</button>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#999;">目前尚無記錄</p>';

        const totals = {};
        let grandTotal = 0;
        this.expenses.forEach(e => {
            totals[e.category] = (totals[e.category] || 0) + e.amount;
            grandTotal += e.amount;
        });

        const sortedEntries = Object.entries(totals).sort((a,b) => b[1] - a[1]);
        this.updateChart(sortedEntries);

        statsList.innerHTML = sortedEntries.map(([name, val], index) => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                <span><i style="display:inline-block; width:10px; height:10px; background:${colorPalette[index % colorPalette.length]}; border-radius:50%; margin-right:8px;"></i>${name}</span>
                <span><strong>$${val.toLocaleString()}</strong></span>
            </div>
        `).join('');
    }

    updateChart(dataEntries) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        if (this.chart) this.chart.destroy();
        if (dataEntries.length === 0) return;
        this.chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: dataEntries.map(e => e[0]),
                datasets: [{
                    data: dataEntries.map(e => e[1]),
                    backgroundColor: colorPalette.slice(0, dataEntries.length),
                    borderWidth: 1
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
}
const app = new App();
</script>
</body>
</html>
