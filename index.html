<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z&M 2026 記帳系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #667eea; --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .theme-min { --primary: #ff4d4f; --bg-grad: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg-grad); min-height: 100vh; padding: 10px; transition: 0.3s; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-sync { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .chart-box { text-align: center; }
        .chart-container { position: relative; height: 160px; width: 100%; margin: 5px 0; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; background: #fff; appearance: none; -webkit-appearance: none; }
        
        /* 編輯模式強化視覺 */
        .edit-active { border: 2px solid #ff9800 !important; background: #fffdf0 !important; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        .btn-cancel { width: 100%; padding: 10px; background: #999; color: white; border: none; border-radius: 10px; margin-top: 8px; cursor: pointer; display: none; }
        
        .record-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px 5px; border-bottom: 1px solid #eee; }
        .amt { font-weight: 800; font-size: 18px; color: #333; }
        .actions { display: flex; gap: 12px; margin-top: 10px; }
        .btn-edit { color: #4466ee; background: #eef2ff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-del { color: #ff4d4f; background: #fff1f0; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        
        @media (max-width: 500px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="bodyTag">

<div class="container">
    <div class="header">
        <div>
            <h1 id="titleTxt" style="font-size: 18px;">Z&M 雲端系統</h1>
            <div id="status" style="font-size: 11px; margin-top: 2px; opacity: 0.9;">連線正常</div>
        </div>
        <button class="btn-sync" onclick="app.fetchCloud(true)">🔄 強制刷新</button>
    </div>

    <div class="charts-grid">
        <div class="card chart-box">
            <h4 style="font-size:13px;">ZIV 支出</h4>
            <div class="chart-container"><canvas id="chartZiv"></canvas></div>
            <div id="totalZiv" style="font-weight:bold; color:#667eea; font-size:14px;">$0</div>
        </div>
        <div class="card chart-box">
            <h4 style="font-size:13px;">MIN 支出</h4>
            <div class="chart-container"><canvas id="chartMin"></canvas></div>
            <div id="totalMin" style="font-weight:bold; color:#ff4d4f; font-size:14px;">$0</div>
        </div>
    </div>

    <div class="card" id="formCard">
        <h3 id="formTitle" style="margin-bottom:12px; font-size:16px;">🧾 新增記錄</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>日期</label><input type="date" id="date"></div>
        <div class="form-group"><label>記帳人</label>
            <select id="person" onchange="app.handleUserChange(this.value)">
                <option value="ZIV">ZIV</option><option value="MIN">MIN</option>
            </select>
        </div>
        <div class="form-group"><label>分類</label><select id="cat"></select></div>
        <div class="form-group"><label>金額</label><input type="number" id="amt" placeholder="0" inputmode="numeric"></div>
        <div class="form-group"><label>描述</label><input type="text" id="desc" placeholder="選填說明"></div>
        <button class="btn-main" id="addBtn">儲存記錄</button>
        <button class="btn-cancel" id="cancelBtn" onclick="app.resetForm()">取消修改</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom:10px; font-size:16px;">📝 歷史明細</h3>
        <div id="list"></div>
    </div>
</div>

<script>
const MASTER_URL = "https://script.google.com/macros/s/AKfycbyyr-CM-850Ykt0sTaCaSF-5lYPULMr1PiljNyyspQvg1cLbI1_ChvwUGEFYTJPkCs9/exec"; 

const categories = ['早餐', '中餐', '晚餐', '消夜', '飲料', '油錢', '停車', 'ETC', '車輛保養維修', '車輛保險稅金', '交通車票計程車', '房貸', '水費', '電費', '瓦斯費', '大樓管理費', '治裝', '教育', '娛樂', '家用修繕', '住家雜費', '食材費用', '零食餅乾', '住宿費', '醫療', '保險費', '家用網路', '手機費', '稅TAX'];
const colorPalette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8bc34a', '#f44336', '#2196f3', '#ffeb3b', '#9c27b0', '#00bcd4', '#e91e63', '#673ab7', '#3f51b5', '#03a9f4', '#009688', '#4caf50', '#cddc39', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e', '#607d8b', '#333333', '#1a237e', '#b71c1c', '#1b5e20'];

class App {
    constructor() {
        this.expenses = [];
        this.currentUser = localStorage.getItem('zm_user') || 'ZIV';
        this.charts = { ZIV: null, MIN: null };
        this.init();
    }

    async init() {
        document.getElementById('person').value = this.currentUser;
        this.applyUserTheme(this.currentUser);
        
        const catSelect = document.getElementById('cat');
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            catSelect.appendChild(opt);
        });
        
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('addBtn').onclick = () => this.handleSave();
        
        await this.fetchCloud();
    }

    handleUserChange(val) {
        this.currentUser = val;
        localStorage.setItem('zm_user', val);
        this.applyUserTheme(val);
    }

    applyUserTheme(user) {
        document.getElementById('bodyTag').className = user === 'MIN' ? 'theme-min' : '';
        document.getElementById('titleTxt').textContent = user + ' 專屬記帳';
    }

    async fetchCloud(isManual = false) {
        const status = document.getElementById('status');
        status.textContent = '☁️ 雲端同步中...';
        try {
            const res = await fetch(MASTER_URL);
            const data = await res.json();
            if (Array.isArray(data)) {
                this.expenses = data;
                status.textContent = '最後更新: ' + new Date().toLocaleTimeString();
                this.render();
                if(isManual) alert('資料已同步至最新狀態！');
            }
        } catch (e) { status.textContent = '❌ 連線異常'; }
    }

    async handleSave() {
        const amtVal = document.getElementById('amt').value;
        if (!amtVal) return alert('金額不能為空');
        
        const status = document.getElementById('status');
        status.textContent = '📡 正在合併並上傳...';

        // 核心修正：儲存前先抓一次雲端，避免覆蓋別人的資料
        try {
            const res = await fetch(MASTER_URL);
            const cloudData = await res.json();
            if (Array.isArray(cloudData)) {
                this.expenses = cloudData;
            }
        } catch(e) { console.log('抓取雲端失敗，使用本地資料'); }

        const editId = document.getElementById('editId').value;
        const newItem = {
            id: editId || Date.now().toString(),
            date: document.getElementById('date').value,
            person: document.getElementById('person').value,
            category: document.getElementById('cat').value,
            amount: parseFloat(amtVal),
            description: document.getElementById('desc').value || ""
        };

        if (editId) {
            const idx = this.expenses.findIndex(e => String(e.id) === String(editId));
            if (idx !== -1) this.expenses[idx] = newItem;
        } else {
            this.expenses.push(newItem);
        }
        
        await this.pushToCloud();
        this.resetForm();
    }

    async delete(id) {
        if (!confirm('確定刪除這筆帳務？')) return;
        
        const status = document.getElementById('status');
        status.textContent = '🗑️ 正在從雲端移除...';

        // 先抓最新的
        try {
            const res = await fetch(MASTER_URL);
            const cloudData = await res.json();
            if (Array.isArray(cloudData)) this.expenses = cloudData;
        } catch(e) {}

        this.expenses = this.expenses.filter(e => String(e.id) !== String(id));
        await this.pushToCloud();
    }

    edit(id) {
        const item = this.expenses.find(e => String(e.id) === String(id));
        if (!item) return alert('找不到該筆記錄');
        
        document.getElementById('editId').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('person').value = item.person;
        document.getElementById('cat').value = item.category;
        document.getElementById('amt').value = item.amount;
        document.getElementById('desc').value = item.description;
        
        document.getElementById('formTitle').textContent = "✏️ 正在修改記錄";
        document.getElementById('addBtn').textContent = "更新此筆";
        document.getElementById('cancelBtn').style.display = "block";
        document.querySelectorAll('#formCard input, #formCard select').forEach(el => el.classList.add('edit-active'));
        
        document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
    }

    resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('amt').value = "";
        document.getElementById('desc').value = "";
        document.getElementById('formTitle').textContent = "🧾 新增記錄";
        document.getElementById('addBtn').textContent = "儲存記錄";
        document.getElementById('cancelBtn').style.display = "none";
        document.querySelectorAll('.edit-active').forEach(el => el.classList.remove('edit-active'));
    }

    async pushToCloud() {
        try {
            await fetch(MASTER_URL, {
                method: 'POST',
                body: JSON.stringify(this.expenses),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            document.getElementById('status').textContent = '✅ 已存入雲端';
            this.render();
        } catch (e) { alert('同步失敗，請檢查網路'); }
    }

    render() {
        const list = document.getElementById('list');
        list.innerHTML = this.expenses.slice().sort((a,b) => b.id - a.id).map(e => `
            <div class="record-item">
                <div style="flex:1;">
                    <div style="font-weight:bold; font-size:15px;">${e.category} <span style="font-weight:normal; font-size:12px; color:#666;">(${e.person})</span></div>
                    <div style="font-size:12px; color:#999; margin-top:2px;">${e.date} | ${e.description}</div>
                    <div class="actions">
                        <button class="btn-edit" onclick="app.edit('${e.id}')">修改</button>
                        <button class="btn-del" onclick="app.delete('${e.id}')">刪除</button>
                    </div>
                </div>
                <div class="amt">$${Math.round(e.amount).toLocaleString()}</div>
            </div>
        `).join('') || '<p style="text-align:center; padding:30px; color:#999;">目前沒有任何記錄</p>';
        this.updateCharts();
    }

    updateCharts() {
        ['ZIV', 'MIN'].forEach(user => {
            const userExps = this.expenses.filter(e => e.person === user);
            const totals = {};
            let sum = 0;
            userExps.forEach(e => {
                totals[e.category] = (totals[e.category] || 0) + e.amount;
                sum += e.amount;
            });
            document.getElementById('total' + (user === 'ZIV' ? 'Ziv' : 'Min')).textContent = '總計: $' + Math.round(sum).toLocaleString();
            const canvasId = 'chart' + (user === 'ZIV' ? 'Ziv' : 'Min');
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (this.charts[user]) this.charts[user].destroy();
            const entries = Object.entries(totals).sort((a,b) => b[1] - a[1]);
            this.charts[user] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: entries.map(e => e[0]),
                    datasets: [{ data: entries.map(e => e[1]), backgroundColor: colorPalette }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        });
    }
}
const app = new App();
</script>
</body>
</html>
