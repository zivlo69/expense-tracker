<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z&M 2026 本月家計</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #667eea; --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .theme-min { --primary: #ff4d4f; --bg-grad: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg-grad); min-height: 100vh; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .header-left { display: flex; flex-direction: column; }
        .header-right { display: flex; gap: 5px; }
        .btn-sync, .btn-logout { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .chart-main { height: 260px; width: 100%; position: relative; margin: 10px 0; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .summary-card { background: white; padding: 12px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        .summary-val { font-size: 18px; font-weight: 900; margin-top: 5px; }
        .ziv-card { border-top-color: #667eea; }
        .min-card { border-top-color: #ff4d4f; }
        .ziv-text { color: #667eea; }
        .min-text { color: #ff4d4f; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; background: #fff; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        .btn-cancel { width: 100%; padding: 10px; background: #999; color: white; border: none; border-radius: 10px; margin-top: 8px; display: none; cursor: pointer; }
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #eee; }
        .amt { font-weight: 800; font-size: 16px; color: #333; margin-right: 10px; }
        .btn-edit { color: #4466ee; background: #eef2ff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
        #loginScreen { position: fixed; inset: 0; background: var(--bg-grad); display: flex; align-items: center; justify-content: center; z-index: 999; }
        .login-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 320px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; }
        .login-error { color: #ff4d4f; font-size: 12px; margin-top: 10px; display: none; }
        .record-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body id="bodyTag">

<div id="loginScreen">
    <div class="login-box">
        <div style="font-size: 50px;">🔐</div>
        <h2>Z&M 家計簿</h2>
        <p style="font-size:12px; color:#999; margin-bottom:20px;">輸入密碼以繼續</p>
        <input type="password" id="pwInput" placeholder="請輸入密碼" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;" onkeypress="if(event.key==='Enter') app.login();">
        <button class="btn-main" onclick="app.login()" id="loginBtn">登入</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<div class="container" id="mainApp" style="display: none;">
    <div class="header">
        <div class="header-left">
            <h1 id="titleTxt" style="font-size: 18px;">Z&M 專屬記帳</h1>
            <div id="status" style="font-size: 11px; opacity: 0.9;">本月統計模式</div>
        </div>
        <div class="header-right">
            <button class="btn-sync" onclick="app.fetchCloud(true)">🔄 刷新</button>
            <button class="btn-logout" onclick="app.logout()">🚪 登出</button>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <h3 id="monthTitle" style="font-size: 15px; color: #333; margin-bottom: 5px;">🏠 家庭本月支出</h3>
        <div class="chart-main"><canvas id="chartTotal"></canvas></div>
        <div id="grandTotal" style="font-size: 24px; font-weight: 900; color: #222;">$0</div>
    </div>

    <div class="summary-grid">
        <div class="summary-card ziv-card"><div>🤴 ZIV 累計</div><div id="sumZiv" class="summary-val ziv-text">$0</div></div>
        <div class="summary-card min-card"><div>👸 MIN 累計</div><div id="sumMin" class="summary-val min-text">$0</div></div>
    </div>

    <div class="card" id="formCard">
        <h3 id="formTitle" style="margin-bottom:12px; font-size:16px;">🧾 記帳 / 修改</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>日期</label><input type="date" id="date"></div>
        <div class="form-group"><label>記帳人</label>
            <select id="person" onchange="app.handleUserChange(this.value)"><option value="ZIV">ZIV</option><option value="MIN">MIN</option></select>
        </div>
        <div class="form-group"><label>分類</label><select id="cat"></select></div>
        <div class="form-group"><label>金額</label><input type="number" id="amt" placeholder="0" inputmode="numeric"></div>
        <div class="form-group"><label>描述</label><input type="text" id="desc" placeholder="備註內容"></div>
        <button class="btn-main" id="addBtn">儲存記錄</button>
        <button class="btn-cancel" id="cancelBtn" onclick="app.resetForm()">取消修改</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom:10px; font-size:16px;">📝 最近記錄</h3>
        <div class="record-controls">
            <select id="recordCountSelect" onchange="app.updateRecordDisplay()" style="padding:5px; border-radius:5px;">
                <option value="20">20筆</option><option value="40" selected>40筆</option><option value="60">60筆</option>
            </select>
        </div>
        <div id="list"></div>
    </div>
</div>

<script>
const MASTER_URL = "https://script.google.com/macros/s/AKfycbyyr-CM-850Ykt0sTaCaSF-5lYPULMr1PiljNyyspQvg1cLbI1_ChvwUGEFYTJPkCs9/exec"; 
const categories = ['早餐', '中餐', '晚餐', '消夜', '飲料', '油錢', '停車', '交通車票計程車', '食材費用', '零食餅寬', '奧斯卡', '治裝', '教育', '娛樂', '家用修繕', '住家雜費', '房貸', '水費', '電費', '瓦斯費', '大樓管理費', '住宿費', '醫療', '保險費', '家用網路', '手機費', 'ETC', '車輛保養維修', '稅金TAX', '其他'];
const colorPalette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8bc34a', '#f44336', '#2196f3', '#ffeb3b', '#9c27b0', '#00bcd4', '#e91e63', '#673ab7', '#3f51b5', '#03a9f4', '#009688', '#4caf50', '#cddc39', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e', '#607d8b', '#333333', '#1a237e', '#b71c1c', '#1b5e20'];

class App {
    constructor() {
        this.expenses = [];
        this.currentUser = localStorage.getItem('zm_user') || 'ZIV';
        this.token = localStorage.getItem('zm_token');
        this.chartTotal = null;
        this.recordDisplayCount = 40;
        this.init();
    }

    init() {
        const catSelect = document.getElementById('cat');
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c; catSelect.appendChild(opt);
        });
        document.getElementById('addBtn').onclick = () => this.handleSave();
        if (this.token) { this.showMainApp(); this.fetchCloud(); }
    }

    showLoginScreen() { document.getElementById('loginScreen').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
    showMainApp() { 
        document.getElementById('loginScreen').style.display='none'; 
        document.getElementById('mainApp').style.display='block';
        // 使用瑞典語系格式強制產出 yyyy-mm-dd
        document.getElementById('date').value = new Date().toLocaleDateString('sv-SE');
        this.applyUserTheme(this.currentUser);
    }

    async login() {
        const password = document.getElementById('pwInput').value;
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        try {
            const res = await fetch(MASTER_URL, { method: 'POST', body: JSON.stringify({ action: 'login', password }) });
            const data = await res.json();
            if (data.token) {
                this.token = data.token; localStorage.setItem('zm_token', this.token);
                this.showMainApp(); this.fetchCloud();
            } else { alert('密碼錯誤'); }
        } catch (e) { alert('連線失敗'); }
        btn.disabled = false;
    }

    logout() { localStorage.removeItem('zm_token'); location.reload(); }

    async fetchCloud(isManual = false) {
        document.getElementById('status').textContent = '☁️ 同步中...';
        try {
            const res = await fetch(MASTER_URL + '?token=' + this.token);
            const data = await res.json();
            if (Array.isArray(data)) {
                this.expenses = data;
                document.getElementById('status').textContent = '最後更新: ' + new Date().toLocaleTimeString();
                this.render();
            }
        } catch (e) { document.getElementById('status').textContent = '❌ 連線逾時'; }
    }

    async handleSave() {
        const amt = parseFloat(document.getElementById('amt').value);
        if (!amt) return alert('請輸入金額');
        const newItem = {
            id: document.getElementById('editId').value || Date.now().toString(),
            date: document.getElementById('date').value,
            person: document.getElementById('person').value,
            category: document.getElementById('cat').value,
            amount: amt,
            description: document.getElementById('desc').value || ''
        };
        const editId = document.getElementById('editId').value;
        if (editId) {
            const idx = this.expenses.findIndex(e => String(e.id) === String(editId));
            this.expenses[idx] = newItem;
        } else { this.expenses.push(newItem); }
        
        await this.pushToCloud();
        this.resetForm();
    }

    async pushToCloud() {
        try {
            await fetch(MASTER_URL, { method: 'POST', body: JSON.stringify({ token: this.token, expenses: this.expenses }) });
            this.render();
        } catch (e) { alert('儲存失敗'); }
    }

    render() {
        const now = new Date();
        const curY = now.getFullYear();
        const curM = now.getMonth();
        
        // 【核心修正】：將字串轉為日期物件，比對年、月數值，不受語系字串影響
        const monthlyData = this.expenses.filter(e => {
            const d = new Date(e.date);
            return d.getFullYear() === curY && d.getMonth() === curM;
        });

        let total = 0, ziv = 0, min = 0;
        const catMap = {};
        monthlyData.forEach(e => {
            total += e.amount;
            if (e.person === 'ZIV') ziv += e.amount;
            if (e.person === 'MIN') min += e.amount;
            catMap[e.category] = (catMap[e.category] || 0) + e.amount;
        });

        document.getElementById('grandTotal').textContent = '$' + Math.round(total).toLocaleString();
        document.getElementById('sumZiv').textContent = '$' + Math.round(ziv).toLocaleString();
        document.getElementById('sumMin').textContent = '$' + Math.round(min).toLocaleString();
        this.updateChart(catMap);

        const list = document.getElementById('list');
        list.innerHTML = this.expenses.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, this.recordDisplayCount).map(e => `
            <div class="record-item">
                <div style="flex:1;">
                    <div style="font-weight:bold;">${e.category} <small style="color:#999">(${e.person})</small></div>
                    <div style="font-size:11px; color:#888;">${e.date} ${e.description}</div>
                </div>
                <div style="display:flex; align-items:center;">
                    <div class="amt">$${Math.round(e.amount)}</div>
                    <button class="btn-edit" onclick="app.edit('${e.id}')">修改</button>
                </div>
            </div>
        `).join('');
    }

    updateChart(catMap) {
        const ctx = document.getElementById('chartTotal').getContext('2d');
        if (this.chartTotal) this.chartTotal.destroy();
        const entries = Object.entries(catMap).sort((a,b) => b[1] - a[1]);
        this.chartTotal = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: entries.map(e => e[0]),
                datasets: [{ data: entries.map(e => e[1]), backgroundColor: colorPalette }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
        });
    }

    edit(id) {
        const item = this.expenses.find(e => String(e.id) === String(id));
        if (!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('person').value = item.person;
        document.getElementById('cat').value = item.category;
        document.getElementById('amt').value = item.amount;
        document.getElementById('desc').value = item.description;
        document.getElementById('formTitle').textContent = "✏️ 修改模式";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    resetForm() { 
        document.getElementById('editId').value = ''; 
        document.getElementById('amt').value = ''; 
        document.getElementById('desc').value = ''; 
        document.getElementById('date').value = new Date().toLocaleDateString('sv-SE');
        document.getElementById('formTitle').textContent = "🧾 記帳 / 修改";
        document.getElementById('cancelBtn').style.display = "none";
    }

    handleUserChange(v) { this.currentUser = v; localStorage.setItem('zm_user', v); this.applyUserTheme(v); }
    applyUserTheme(u) { document.getElementById('bodyTag').className = u === 'MIN' ? 'theme-min' : ''; document.getElementById('titleTxt').textContent = u + ' 專屬記帳'; }
    updateRecordDisplay() { this.recordDisplayCount = document.getElementById('recordCountSelect').value; this.render(); }
}
const app = new App();
</script>
</body>
</html>
