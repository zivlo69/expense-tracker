<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z&M記帳本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f3e7e9 0%, #f5f7fa 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
        }

        .header-info {
            text-align: right;
        }

        .header-date {
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .total-amount {
            font-size: 28px;
            font-weight: bold;
        }

        .settings-btn {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .settings-btn:hover {
            background: #f0f0f0;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #333;
        }

        .pie-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .empty-message {
            color: #999;
            text-align: center;
            font-size: 14px;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .category-name {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .category-amount {
            font-weight: bold;
            color: #333;
            text-align: right;
            min-width: 100px;
        }

        .category-percent {
            font-size: 12px;
            color: #999;
            margin-left: 10px;
            min-width: 50px;
            text-align: right;
        }

        .form-card {
            position: sticky;
            top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #666;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .records-section {
            grid-column: 1 / -1;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .record-left {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .record-info p {
            margin: 3px 0;
            font-size: 14px;
        }

        .record-info p:first-child {
            font-weight: 600;
            color: #333;
        }

        .record-info p:last-child {
            color: #999;
            font-size: 12px;
        }

        .record-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .record-amount {
            font-weight: bold;
            color: #333;
            min-width: 80px;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .form-card {
                position: static;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-info {
                text-align: left;
                margin-top: 15px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>💑 Z&M記帳本</h1>
            </div>
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 15px;">
                <button class="settings-btn" onclick="app.toggleSettings()">⚙️ 設定</button>
                <div class="header-info">
                    <div class="header-date" id="headerDate"></div>
                    <div class="total-amount" id="totalAmount">NT$0</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left: Pie Chart & Statistics -->
            <div>
                <!-- Pie Chart -->
                <div class="card">
                    <h2>📊 本月支出分布</h2>
                    <div class="pie-container" id="pieContainer">
                        <p class="empty-message">還沒有本月記帳記錄</p>
                    </div>
                </div>

                <!-- Category Statistics -->
                <div class="card" style="margin-top: 30px;">
                    <h2>💰 類別統計</h2>
                    <div id="categoryStats">
                        <p class="empty-message">暫無記錄</p>
                    </div>
                </div>
            </div>

            <!-- Right: Input Form -->
            <div class="form-card">
                <div class="card">
                    <h2>🧾 記一筆帳</h2>
                    
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="date">
                    </div>

                    <div class="form-group">
                        <label>記帳人</label>
                        <select id="person">
                            <option value="ZIV">ZIV</option>
                            <option value="MIN">MIN</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>項目</label>
                        <select id="category">
                            <option value="早餐">早餐</option>
                            <option value="中餐">中餐</option>
                            <option value="晚餐">晚餐</option>
                            <option value="消夜">消夜</option>
                            <option value="飲料">飲料</option>
                            <option value="油錢">油錢</option>
                            <option value="停車">停車</option>
                            <option value="ETC">ETC</option>
                            <option value="車輛保養維修">車輛保養維修</option>
                            <option value="車輛保險稅金">車輛保險稅金</option>
                            <option value="交通車票計程車">交通車票計程車</option>
                            <option value="房貸">房貸</option>
                            <option value="水費">水費</option>
                            <option value="電費">電費</option>
                            <option value="瓦斯費">瓦斯費</option>
                            <option value="大樓管理費">大樓管理費</option>
                            <option value="治裝">治裝</option>
                            <option value="教育">教育</option>
                            <option value="娛樂">娛樂</option>
                            <option value="家用修繕">家用修繕</option>
                            <option value="住家雜費">住家雜費</option>
                            <option value="食材費用">食材費用</option>
                            <option value="零食餅乾">零食餅乾</option>
                            <option value="住宿費">住宿費</option>
                            <option value="醫療">醫療</option>
                            <option value="保險費">保險費</option>
                            <option value="家用網路">家用網路</option>
                            <option value="手機費">手機費</option>
                            <option value="稅TAX">稅TAX</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>金額 (NT$)</label>
                        <input type="number" id="amount" placeholder="0">
                    </div>

                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="description" placeholder="例: 便利商店早餐">
                    </div>

                    <button class="btn-submit" onclick="app.addExpense()">➕ 記帳</button>
                </div>
            </div>
        </div>

        <!-- Records Section -->
        <div class="card records-section">
            <h2>📝 本月記錄</h2>
            <div id="recordsList">
                <p class="empty-message">本月還沒有記帳記錄</p>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>⚙️ 設定</h2>
                <div class="form-group">
                    <label>Google Apps Script 部署 URL</label>
                    <input type="text" id="urlInput" placeholder="貼上 Google Apps Script 部署 URL">
                    <p style="font-size: 12px; color: #999; margin-top: 5px;">建立 Google Sheets 和 Apps Script 後，複製部署 URL</p>
                </div>
                <div class="modal-buttons">
                    <button class="btn-primary" onclick="app.saveUrl()">保存</button>
                    <button class="btn-secondary" onclick="app.toggleSettings()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categories = ['早餐', '中餐', '晚餐', '消夜', '飲料', '油錢', '停車', 'ETC', '車輛保養維修', '車輛保險稅金', '交通車票計程車', '房貸', '水費', '電費', '瓦斯費', '大樓管理費', '治裝', '教育', '娛樂', '家用修繕', '住家雜費', '食材費用', '零食餅乾', '住宿費', '醫療', '保險費', '家用網路', '手機費', '稅TAX'];

        const colors = {
            '早餐': '#FF6B6B', '中餐': '#FF8C42', '晚餐': '#FFB84D', '消夜': '#FFD93D', '飲料': '#FF9999',
            '油錢': '#4ECDC4', '停車': '#45B7D1', 'ETC': '#00A8CC', '車輛保養維修': '#0088CC', '車輛保險稅金': '#0066AA',
            '交通車票計程車': '#2E86AB', '房貸': '#AA96DA', '水費': '#5DADE2', '電費': '#F4D03F', '瓦斯費': '#EB984E',
            '大樓管理費': '#85C1E2', '治裝': '#F38181', '教育': '#A8D8EA', '娛樂': '#95E1D3', '家用修繕': '#B4A7D6',
            '住家雜費': '#FCBAD3', '食材費用': '#A9DFBF', '零食餅乾': '#F8B88B', '住宿費': '#D7BDE2', '醫療': '#F5B7B1',
            '保險費': '#AED6F1', '家用網路': '#A3E4D7', '手機費': '#E8DAEF', '稅TAX': '#D5A6BD'
        };

        class ExpenseApp {
            constructor() {
                this.expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
                this.googleSheetUrl = localStorage.getItem('googleSheetUrl') || '';
                this.init();
            }

            init() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date').value = today;
                document.getElementById('urlInput').value = this.googleSheetUrl;
                this.render();
            }

            getCurrentMonth() {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            }

            getCurrentMonthExpenses() {
                const month = this.getCurrentMonth();
                return this.expenses.filter(e => e.date.startsWith(month));
            }

            calculateCategoryTotals() {
                const monthlyExpenses = this.getCurrentMonthExpenses();
                const totals = categories.map(cat => {
                    const total = monthlyExpenses
                        .filter(e => e.category === cat)
                        .reduce((sum, e) => sum + parseFloat(e.amount || 0), 0);
                    return { name: cat, value: Math.round(total * 100) / 100, color: colors[cat] };
                }).filter(item => item.value > 0).sort((a, b) => b.value - a.value);
                return totals;
            }

            drawPieChart(categoryTotals) {
                const container = document.getElementById('pieContainer');
                if (categoryTotals.length === 0) {
                    container.innerHTML = '<p class="empty-message">還沒有本月記帳記錄</p>';
                    return;
                }

                const canvas = document.createElement('canvas');
                canvas.width = 300;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');

                const total = categoryTotals.reduce((sum, item) => sum + item.value, 0);
                let startAngle = -Math.PI / 2;

                categoryTotals.forEach(item => {
                    const sliceAngle = (item.value / total) * Math.PI * 2;
                    ctx.fillStyle = item.color;
                    ctx.beginPath();
                    ctx.arc(150, 150, 100, startAngle, startAngle + sliceAngle);
                    ctx.lineTo(150, 150);
                    ctx.fill();
                    startAngle += sliceAngle;
                });

                container.innerHTML = '';
                container.appendChild(canvas);
            }

            render() {
                const monthlyExpenses = this.getCurrentMonthExpenses();
                const categoryTotals = this.calculateCategoryTotals();
                const totalExpense = categoryTotals.reduce((sum, item) => sum + item.value, 0);

                // 更新 Header
                document.getElementById('headerDate').textContent = this.getCurrentMonth();
                document.getElementById('totalAmount').textContent = `NT$${totalExpense.toFixed(0)}`;

                // 畫圓餅圖
                this.drawPieChart(categoryTotals);

                // 類別統計
                const statsHtml = categoryTotals.length > 0 ? categoryTotals.map(item => `
                    <div class="category-item">
                        <div class="category-name">
                            <div class="color-dot" style="background-color: ${item.color}"></div>
                            <span>${item.name}</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="category-amount">NT$${item.value.toFixed(0)}</span>
                            <span class="category-percent">${((item.value / totalExpense) * 100).toFixed(1)}%</span>
                        </div>
                    </div>
                `).join('') : '<p class="empty-message">暫無記錄</p>';

                document.getElementById('categoryStats').innerHTML = statsHtml;

                // 記錄列表
                const recordsHtml = monthlyExpenses.length > 0 ? [...monthlyExpenses].reverse().map(expense => `
                    <div class="record-item">
                        <div class="record-left">
                            <div class="color-dot" style="background-color: ${colors[expense.category]}"></div>
                            <div class="record-info">
                                <p>${expense.category}</p>
                                <p>${expense.date} · ${expense.person} ${expense.description ? `· ${expense.description}` : ''}</p>
                            </div>
                        </div>
                        <div class="record-right">
                            <span class="record-amount">NT$${expense.amount.toFixed(0)}</span>
                            <button class="btn-delete" onclick="app.deleteExpense(${expense.id})">刪除</button>
                        </div>
                    </div>
                `).join('') : '<p class="empty-message">本月還沒有記帳記錄</p>';

                document.getElementById('recordsList').innerHTML = recordsHtml;
            }

            addExpense() {
                const date = document.getElementById('date').value;
                const person = document.getElementById('person').value;
                const category = document.getElementById('category').value;
                const amount = parseFloat(document.getElementById('amount').value);
                const description = document.getElementById('description').value;

                if (!date || !amount || isNaN(amount)) {
                    alert('請填寫日期和金額');
                    return;
                }

                const expense = { id: Date.now(), date, person, category, amount, description };
                this.expenses.push(expense);
                localStorage.setItem('expenses', JSON.stringify(this.expenses));

                // 發送到 Google Sheets
                if (this.googleSheetUrl) {
                    this.sendToGoogleSheet(expense);
                }

                // 重置表單
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                document.getElementById('date').value = new Date().toISOString().split('T')[0];

                this.render();
            }

            deleteExpense(id) {
                this.expenses = this.expenses.filter(e => e.id !== id);
                localStorage.setItem('expenses', JSON.stringify(this.expenses));
                this.render();
            }

            sendToGoogleSheet(expense) {
                fetch(this.googleSheetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        date: expense.date,
                        person: expense.person,
                        category: expense.category,
                        amount: expense.amount,
                        description: expense.description
                    })
                }).then(() => console.log('已發送到 Google Sheets')).catch(e => console.log('發送失敗:', e));
            }

            toggleSettings() {
                const modal = document.getElementById('settingsModal');
                modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
            }

            saveUrl() {
                const url = document.getElementById('urlInput').value;
                this.googleSheetUrl = url;
                localStorage.setItem('googleSheetUrl', url);
                this.toggleSettings();
                alert('Google Sheets URL 已保存');
            }
        }

        const app = new ExpenseApp();
    </script>
</body>
</html>
