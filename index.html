<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z&M 2026 雲端家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #667eea; --bg-grad: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .theme-min { --primary: #ff4d4f; --bg-grad: linear-gradient(135deg, #fff1f0 0%, #ffccc7 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg-grad); min-height: 100vh; padding: 10px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: var(--primary); color: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-sync { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .chart-main { height: 260px; width: 100%; position: relative; margin: 10px 0; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .chart-sub { height: 140px; position: relative; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; background: #fff; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        .btn-cancel { width: 100%; padding: 10px; background: #999; color: white; border: none; border-radius: 10px; margin-top: 8px; cursor: pointer; display: none; }
        .record-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 5px; border-bottom: 1px solid #eee; }
        .amt { font-weight: 800; font-size: 18px; color: #333; }
        .btn-edit { color: #4466ee; background: #eef2ff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        @media (max-width: 500px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="bodyTag">

<div class="container">
    <div class="header">
        <div>
            <h1 id="titleTxt" style="font-size: 18px;">Z&M 2026</h1>
            <div id="status" style="font-size: 11px; margin-top: 2px; opacity: 0.9;">連線正常</div>
        </div>
        <button class="btn-sync" onclick="app.fetchCloud(true)">🔄 強制刷新</button>
    </div>

    <div class="card" style="text-align: center;">
        <h3 style="font-size: 15px; color: #333;">🏠 家庭總支出分類</h3>
        <div class="chart-main"><canvas id="chartTotal"></canvas></div>
        <div id="grandTotal" style="font-size: 18px; font-weight: 900; color: #444;">$0</div>
    </div>

    <div class="charts-grid">
        <div class="card" style="text-align: center;"><h4 style="font-size: 12px;">🤴 ZIV</h4><div class="chart-sub"><canvas id="chartZiv"></canvas></div></div>
        <div class="card" style="text-align: center;"><h4 style="font-size: 12px;">👸 MIN</h4><div class="chart-sub"><canvas id="chartMin"></canvas></div></div>
    </div>

    <div class="card" id="formCard">
        <h3 id="formTitle" style="margin-bottom:12px; font-size:16px;">🧾 記帳 / 修改</h3>
        <input type="hidden" id="editId">
        <div class="form-group"><label>日期</label><input type="date" id="date"></div>
        <div class="form-group"><label>記帳人</label>
            <select id="person" onchange="app.handleUserChange(this.value)">
                <option value="ZIV">ZIV</option><option value="MIN">MIN</option>
            </select>
        </div>
        <div class="form-group"><label>分類</label><select id="cat"></select></div>
        <div class="form-group"><label>金額</label><input type="number" id="amt" placeholder="請輸入金額" inputmode="numeric"></div>
        <div class="form-group"><label>描述</label><input type="text" id="desc" placeholder="選填備註"></div>
        <button class="btn-main" id="addBtn">儲存記錄</button>
        <button class="btn-cancel" id="cancelBtn" onclick="app.resetForm()">取消修改</button>
    </div>

    <div class="card">
        <h3 style="margin-bottom:10px; font-size:16px;">📝 歷史明細</h3>
        <div id="list"></div>
    </div>
</div>

<script>
const MASTER_URL = "https://script.google.com/macros/s/AKfycbyyr-CM-850Ykt0sTaCaSF-5lYPULMr1PiljNyyspQvg1cLbI1_ChvwUGEFYTJPkCs9/exec"; 

const categories = ['早餐', '中餐', '晚餐', '消夜', '飲料', '油錢', '停車', 'ETC', '車輛保養維修', '車輛保險稅金', '交通車票計程車', '房貸', '水費', '電費', '瓦斯費', '大樓管理費', '治裝', '教育', '娛樂', '家用修繕', '住家雜費', '食材費用', '零食餅乾', '住宿費', '醫療', '保險費', '家用網路', '手機費', '稅TAX'];
const colorPalette = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#8bc34a', '#f44336', '#2196f3', '#ffeb3b', '#9c27b0', '#00bcd4', '#e91e63', '#673ab7', '#3f51b5', '#03a9f4', '#009688', '#4caf50', '#cddc39', '#ffc107', '#ff9800', '#ff5722', '#795548', '#9e9e9e', '#607d8b', '#333333', '#1a237e', '#b71c1c', '#1b5e20'];

class App {
    constructor() {
        this.expenses = [];
        this.currentUser = localStorage.getItem('zm_user') || 'ZIV';
        this.charts = { Total: null, ZIV: null, MIN: null };
        this.init();
    }

    async init() {
        document.getElementById('person').value = this.currentUser;
        this.applyUserTheme(this.currentUser);
        const catSelect = document.getElementById('cat');
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            catSelect.appendChild(opt);
        });
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('addBtn').onclick = () => this.handleSave();
        await this.fetchCloud();
    }

    handleUserChange(val) {
        this.currentUser = val;
        localStorage.setItem('zm_user', val);
        this.applyUserTheme(val);
    }

    applyUserTheme(user) {
        document.getElementById('bodyTag').className = user === 'MIN' ? 'theme-min' : '';
        document.getElementById('titleTxt').textContent = user + ' 專屬記帳';
    }

    async fetchCloud(isManual = false) {
        const status = document.getElementById('status');
        status.textContent = '☁️ 同步中...';
        try {
            const res = await fetch(MASTER_URL);
            const data = await res.json();
            if (Array.isArray(data)) {
                this.expenses = data;
                status.textContent = '最後更新: ' + new Date().toLocaleTimeString();
                this.render();
                if(isManual) alert('資料已同步！');
            }
        } catch (e) { status.textContent = '❌ 連線異常'; }
    }

    async handleSave() {
        const amtInput = document.getElementById('amt');
        const addBtn = document.getElementById('addBtn');
        const amtVal = amtInput.value;
        
        if (!amtVal || amtVal <= 0) return alert('請輸入有效金額');
        
        // 鎖定按鈕，防止連點
        addBtn.disabled = true;
        addBtn.textContent = "傳送中...";

        try {
            // 儲存前刷一下雲端資料
            const res = await fetch(MASTER_URL);
            const cloudData = await res.json();
            if (Array.isArray(cloudData)) this.expenses = cloudData;
        } catch(e) {}

        const editId = document.getElementById('editId').value;
        const newItem = {
            id: editId || Date.now().toString(),
            date: document.getElementById('date').value,
            person: document.getElementById('person').value,
            category: document.getElementById('cat').value,
            amount: parseFloat(amtVal),
            description: document.getElementById('desc').value || ""
        };

        if (editId) {
            const idx = this.expenses.findIndex(e => String(e.id) === String(editId));
            if (idx !== -1) this.expenses[idx] = newItem;
        } else {
            this.expenses.push(newItem);
        }
        
        await this.pushToCloud();
        this.resetForm(); // 這邊會清空欄位
        addBtn.disabled = false;
    }

    async pushToCloud() {
        try {
            await fetch(MASTER_URL, {
                method: 'POST',
                body: JSON.stringify(this.expenses),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            document.getElementById('status').textContent = '✅ 已更新雲端';
            this.render();
        } catch (e) { alert('同步失敗'); }
    }

    edit(id) {
        const item = this.expenses.find(e => String(e.id) === String(id));
        if (!item) return;
        document.getElementById('editId').value = item.id;
        document.getElementById('date').value = item.date;
        document.getElementById('person').value = item.person;
        document.getElementById('cat').value = item.category;
        document.getElementById('amt').value = item.amount;
        document.getElementById('desc').value = item.description;
        document.getElementById('formTitle').textContent = "✏️ 修改模式";
        document.getElementById('addBtn').textContent = "更新記錄";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({ top: document.getElementById('formCard').offsetTop - 20, behavior: 'smooth' });
    }

    resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('amt').value = ""; // 清空金額格子
        document.getElementById('desc').value = ""; // 清空描述格子
        document.getElementById('formTitle').textContent = "🧾 記帳 / 修改";
        document.getElementById('addBtn').textContent = "儲存記錄";
        document.getElementById('cancelBtn').style.display = "none";
        // 日期保留今天，不需清空
    }

    render() {
        const list = document.getElementById('list');
        list.innerHTML = this.expenses.slice().sort((a,b) => b.id - a.id).map(e => `
            <div class="record-item">
                <div style="flex:1;">
                    <div style="font-weight:bold;">${e.category} <small>(${e.person})</small></div>
                    <div style="font-size:12px; color:#666;">${e.date} ${e.description}</div>
                </div>
                <div style="text-align:right;">
                    <div class="amt">$${Math.round(e.amount).toLocaleString()}</div>
                    <button class="btn-edit" onclick="app.edit('${e.id}')">修改</button>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#999;">目前無紀錄</p>';
        this.updateCharts();
    }

    updateCharts() {
        const totalMap = {}; let grandTotal = 0;
        this.expenses.forEach(e => {
            totalMap[e.category] = (totalMap[e.category] || 0) + e.amount;
            grandTotal += e.amount;
        });
        document.getElementById('grandTotal').textContent = '家庭總支出: $' + Math.round(grandTotal).toLocaleString();
        this.drawPie('Total', totalMap, true);
        ['ZIV', 'MIN'].forEach(user => {
            const userMap = {};
            this.expenses.filter(e => e.person === user).forEach(e => {
                userMap[e.category] = (userMap[e.category] || 0) + e.amount;
            });
            this.drawPie(user, userMap, false);
        });
    }

    drawPie(type, dataMap, showLegend) {
        const ctx = document.getElementById('chart' + type).getContext('2d');
        if (this.charts[type]) this.charts[type].destroy();
        const entries = Object.entries(dataMap).sort((a,b) => b[1] - a[1]);
        this.charts[type] = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: entries.map(e => e[0]),
                datasets: [{ data: entries.map(e => e[1]), backgroundColor: colorPalette }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: showLegend, position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
            }
        });
    }
}
const app = new App();
</script>
</body>
</html>
